services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: inkvite
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d inkvite"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s